mode: rule
ipv6: false
log-level: info
allow-lan: false
unified-delay: true
tcp-concurrent: true
external-controller: 127.0.0.1:9090

dns:
  enable: true
  listen: 127.0.0.1:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 1.1.1.1
    - 1.0.0.1
  nameserver:
    - "https://cloudflare-dns.com/dns-query"
    - "tls://1dot1dot1dot1.cloudflare-dns.com"

tun:                           
  enable: true
  stack: gvisor                 
  dns-hijack:
    - any:53
  auto-route: true
  auto-detect-interface: true
  mtu: 1280

keep-alive-idle: 15
keep-alive-interval: 15

profile:
  store-selected: true
  tracing: false

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - '+.lan'
    - '+.local'
    - '+.push.apple.com'
    - '+.apple.com'
    - '+.msftconnecttest.com'
    - '+.3gppnetwork'

proxies:
  - name: awg-fi0.tribukvy.ltd
    type: wireguard
    server: fi0.tribukvy.ltd
    port: 1843
    ip: 172.16.0.2
    ipv6: 2606:4700:110:83f9:ba96:ee76:d67a:6f2f
    private-key: aDnMTT3Uuni/FW8mUMHjc+fc5YnNayrv1Ip19Mst1Gc=
    public-key: bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
    udp: true
    mtu: 1280
    dns:
      - 1.1.1.1
    amnezia-wg-option:
      jc: 4
      jmin: 40
      jmax: 70
      s1: 0
      s2: 0
      h1: 1
      h2: 2
      h3: 3
      h4: 4
      i1: "<b >"
      i2: "<b >"

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - awg-fi0.tribukvy.ltd
      - DIRECT

rules:
  - GEOIP,RU,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - MATCH,Proxy
